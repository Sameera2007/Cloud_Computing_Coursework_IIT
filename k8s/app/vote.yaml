apiVersion: apps/v1
kind: Deployment
metadata:
  name: vote
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vote
  template:
    metadata:
      labels:
        app: vote
    spec:
      containers:
        - name: vote
          image: techsalaryacrsk.azurecr.io/techsalary/vote:v1
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
            - name: SALARY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SALARY_SERVICE_URL
            - name: APPROVAL_THRESHOLD
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APPROVAL_THRESHOLD
          livenessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4003
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: vote-service
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: vote
  ports:
    - port: 4003
      targetPort: 4003
