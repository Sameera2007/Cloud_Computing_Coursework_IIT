apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      containers:
        - name: bff
          image: techsalaryacrsk.azurecr.io/techsalary/bff:v1
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
            - name: SALARY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SALARY_SERVICE_URL
            - name: IDENTITY_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: IDENTITY_SERVICE_URL
            - name: VOTE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: VOTE_SERVICE_URL
            - name: SEARCH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SEARCH_SERVICE_URL
            - name: STATS_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STATS_SERVICE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: bff
  ports:
    - port: 4000
      targetPort: 4000
