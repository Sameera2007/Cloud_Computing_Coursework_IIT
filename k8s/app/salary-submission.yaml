apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-submission
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salary-submission
  template:
    metadata:
      labels:
        app: salary-submission
    spec:
      containers:
        - name: salary-submission
          image: techsalaryacrsk.azurecr.io/techsalary/salary-submission:v1
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DB_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: salary-submission-service
  namespace: app
spec:
  type: ClusterIP
  selector:
    app: salary-submission
  ports:
    - port: 4001
      targetPort: 4001
